<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Perulangan III (Do-While)</title>
  </head>
  <body>
    <script language="javascript">
      //menyembunyikan script dan browser non-JS
      function pass() {
        var coba = 1;
        do {
          p = prompt("Tuliskan password dengan benar", "");
          if (p == "GRAFIKA") {
            alert("Selamat datang Friends");
            window.open("welcome.html");
            break;
          } else {
            alert("Password salah !!! Ulangi lagi");
          }
          if (coba == 3) {
            alert("Maaf, kesempatan anda hanya 3 kali");
            history.go(-1);
          }
          coba = coba + 1;
        } while (coba <= 3);
      }
      // akhir dari penyembunyian script
    </script>
    <form method="post">
      <input type="button" value="Password" onclick="pass()" />
    </form>
  </body>
</html>
