<!DOCTYPE html>
<html>
<head>
    <title>TugasMandiri</title>
</head>
<body style="background-color: #f0f8ff; font-family: Arial, Montserrat;">

    <form method="get" action="">
        <table style="margin: 0 auto; border: 2px solid #ccc; padding: 15px; background-color: #f8f8f8;">
            <caption align="center">
                <h2 style="color: #2e8b57;">Formulir Pendaftaran</h2>
            </caption>

            <tr>
                <td>Nama</td>
                <td>:</td>
                <td colspan="3"><input type="text" name="nama" size="30"></td>
            </tr>
		
            <tr>
                <td>Password</td>
                <td>:</td>
                <td colspan="3">
                    <input type="password" name="password" size="30" style="background-color: #FFFCC8; border: 1px solid black;">
                </td>
            </tr>

            <tr>
                <td>Tanggal Lahir</td>
                <td>:</td>
                <td colspan="3">
                    <input type="text" size="2"> /
                    <input type="text" size="2"> /
                    <input type="text" size="4"> (hh/bb/tttt)
                </td>
            </tr>

            <tr>
                <td>Jenis Kelamin</td>
                <td>:</td>
                <td><input type="radio" name="gender" value="Laki-Laki"> Laki-Laki</td>
                <td><input type="radio" name="gender" value="Perempuan"> Perempuan</td>
            </tr>

            <tr>
                <td>Jurusan</td>
                <td>:</td>
                <td>
                    <select name="jurusan">
                        <option value="RPL" selected>RPL</option>
                        <option value="TKJ">TKJ</option>
                        <option value="TM">TM</option>
                        <option value="DKV">DKV</option>
                        <option value="ANI">ANI</option>
                        <option value="TG">TG</option>
                        <option value="PH">PH</option>
                        <option value="TL">TL</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td rowspan="2">Hoby</td>
                <td rowspan="2">:</td>
                <td><input type="checkbox" name="hoby"> Football</td>
                <td><input type="checkbox" name="hoby"> Traveling</td>
                <td><input type="checkbox" name="hoby"> Blogging</td>
            </tr>
            <tr>
                <td><input type="checkbox" name="hoby"> Music</td>
                <td><input type="checkbox" name="hoby"> Adventure</td>
                <td><input type="checkbox" name="hoby"> Lainnya</td>
            </tr>

            <tr>
                <td>Alamat</td>
                <td>:</td>
                <td colspan="3">
                    <textarea name="alamat" cols="30" rows="6" style="font-family: Arial;"></textarea>
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
