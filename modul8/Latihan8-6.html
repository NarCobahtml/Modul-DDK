<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Perulangan II</title>
  </head>
  <script language="javascript">
    //menyembunyikan script dan browser non-JS
    var deret = prompt("Masukkang Jumlah Deret :", "");
    document.writeln("<h2>Latihan Perulangan While</h2>");
    document.writeln("<hr>");
    document.writeln("<br>");
    var jml = 0.0;
    var angka = 1;
    while (angka <= deret) {
      jml = jml + angka;
      angka++;
    }
    document.writeln("<br>");
    document.writeln("Jumlah Deret 1 sampai " + deret + " adalah : " + jml);
    document.writeln("<br>");
    document.writeln("<hr>");
    // akhir dari penyembunyian script
  </script>
  <body></body>
</html>
